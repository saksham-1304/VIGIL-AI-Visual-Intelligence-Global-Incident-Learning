apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: incident-api
  template:
    metadata:
      labels:
        app: incident-api
    spec:
      containers:
        - name: api
          image: incident-intel/api:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          env:
            - name: DATABASE_URL
              value: postgresql://incident:incident@postgres:5432/incident_intel
            - name: REDIS_URL
              value: redis://redis:6379/0
---
apiVersion: v1
kind: Service
metadata:
  name: incident-api
spec:
  selector:
    app: incident-api
  ports:
    - port: 8000
      targetPort: 8000
